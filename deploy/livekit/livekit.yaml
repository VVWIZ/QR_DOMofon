# deploy/livekit/livekit.yaml — dev-конфиг self-hosted LiveKit (architecture.md §4.4).
# UDP mux на 7882 (single-port). node_ip = реальный LAN-IP хоста: на машине с
# виртуальными адаптерами WSL/Docker (172.x) браузер отдаёт их ICE-кандидатами,
# и на 127.0.0.1 медиа/DTLS не течёт (publisher data channel closes). LAN-IP
# даёт рабочую ICE-пару (браузер и сервер на одном 192.168.x). Подставить IP хоста!
# НЕ ДЛЯ ПРОД: dev-ключ devkey/секрет (совпадает с .env LIVEKIT_API_*).

port: 7880

rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
  node_ip: 192.168.0.104

logging:
  level: info

# key: secret. Секрет совпадает с LIVEKIT_API_SECRET в .env.example.
keys:
  devkey: devsecret_change_me_at_least_32_chars
